{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MovieRec | My Watchlist</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        /* Reusing your global styles */
        body { background-color: #141414; color: white; font-family: 'Segoe UI', sans-serif; }
        .navbar { background-color: rgba(0,0,0,0.95); }
        .card { background-color: #1a1a1a; border: none; transition: transform 0.3s; border-radius: 8px; overflow: hidden; height: 100%; }
        .card:hover { transform: scale(1.05); cursor: pointer; }
        img.card-img-top { height: 320px; object-fit: cover; }
        .text-danger { color: #e50914 !important; }
        .btn-outline-secondary { border-color: #444; color: #888; }
        .btn-outline-secondary:hover { background-color: #e50914; border-color: #e50914; color: white; }
        .text-muted { color: #b3b3b3 !important; }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark sticky-top">
    <div class="container">
        <a class="navbar-brand fw-bold text-danger fs-3" href="{% url 'movie_search' %}">MOVIEREC</a>
        <div class="d-flex align-items-center">
            <span class="text-muted me-3">Logged in as {{ user.username }}</span>
            <a href="{% url 'movie_search' %}" class="btn btn-sm btn-outline-light me-2">Browse</a>
            <button onclick="handleLogout()" class="btn btn-sm btn-danger">Logout</button>
        </div>
    </div>
</nav>

<main class="container py-5">
    <header class="mb-5 d-flex justify-content-between align-items-end">
        <div>
            <h1 class="display-5 fw-bold text-white">My <span class="text-danger">Watchlist</span></h1>
            <p class="text-muted fs-5" id="watchlist-count">Loading movies...</p>
        </div>
        <div class="pb-2">
            <a href="{% url 'export_watchlist_json' %}" class="btn btn-sm btn-outline-light opacity-75">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-download me-2" viewBox="0 0 16 16">
                    <path d="M.5 9.9a.5.5 0 0 1 .5.5v2.5a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1v-2.5a.5.5 0 0 1 1 0v2.5a2 2 0 0 1-2 2H2a2 2 0 0 1-2-2v-2.5a.5.5 0 0 1 .5-.5z"/>
                    <path d="M7.646 11.854a.5.5 0 0 0 .708 0l3-3a.5.5 0 0 0-.708-.708L8.5 10.293V1.5a.5.5 0 0 0-1 0v8.793L5.354 8.146a.5.5 0 1 0-.708.708l3 3z"/>
                </svg>
                Export JSON
            </a>
        </div>
    </header>

    <div class="row row-cols-2 row-cols-md-3 row-cols-lg-5 g-4" id="watchlist-grid">
        <div class="col-12 text-center py-5">
            <div class="spinner-border text-danger" role="status"></div>
            <p class="mt-2 text-muted">Fetching your movies...</p>
        </div>
    </div>

    <hr class="border-secondary my-5">
    
    <header class="mb-4">
        <h2 class="fw-bold">Suggested <span class="text-danger">For You</span></h2>
        <p class="text-muted small">Based on your taste profile</p>
    </header>

    <div class="row row-cols-2 row-cols-md-5 g-4" id="suggestions-grid">
        </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="{% static 'recommender/js/watchlist.js' %}"></script>
<script src="{% static 'recommender/js/auth.js' %}"></script>
</body>
</html>
