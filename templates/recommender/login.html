{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MovieRec | Sign In</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #141414; color: white; height: 100vh; display: flex; align-items: center; }
        .login-box { background: #1a1a1a; padding: 40px; border-radius: 10px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); width: 100%; max-width: 400px; }
        .btn-danger { background-color: #e50914; border: none; font-weight: bold; }
        
        /* Custom Input Styling */
        .form-control-custom { 
            background-color: #333 !important; 
            border: 1px solid #444 !important; 
            color: white !important; 
            width: 100%;
            padding: 12px;
            margin-bottom: 20px;
            border-radius: 5px;
        }
        .form-control-custom::placeholder { color: #888; }
        .text-muted { color: #b3b3b3 !important; }
        
        /* Error Message Styling */
        #login-error { color: #e50914; font-size: 0.85rem; display: none; margin-bottom: 15px; }
    </style>
</head>
<body>
    <div class="container d-flex justify-content-center">
        <div class="login-box text-center">
            <h2 class="text-danger fw-bold mb-4">Sign In</h2>
            
            <div id="login-error"></div>

            <form id="login-form" onsubmit="handleLogin(event)">
                {% csrf_token %}
                <div class="text-start">
                    <input type="text" name="username" class="form-control-custom" 
                           placeholder="Username" required autocomplete="username">
                    
                    <input type="password" name="password" class="form-control-custom" 
                           placeholder="Password" required autocomplete="current-password">
                </div>
                
                <button type="submit" id="login-btn" class="btn btn-danger w-100 py-2 mt-2">
                    <span id="btn-text">Sign In</span>
                    <span id="btn-spinner" class="spinner-border spinner-border-sm d-none" role="status"></span>
                </button>
            </form>
            
            <p class="mt-4 text-muted small">
                New to MovieRec? <a href="{% url 'register' %}" class="text-white text-decoration-none fw-bold">Sign up now.</a>
            </p>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <script src="{% static 'recommender/js/auth.js' %}"></script>
</body>
</html>
