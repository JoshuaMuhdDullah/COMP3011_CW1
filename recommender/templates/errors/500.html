<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>500 - Server Error</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #141414; /* Netflix Black */
            color: white;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
        }
        .error-container {
            max-width: 600px;
            padding: 40px;
        }
        h1 {
            font-size: 6rem;
            font-weight: 900;
            color: #e50914; /* Netflix Red */
            margin-bottom: 0;
        }
        p {
            font-size: 1.25rem;
            color: #b3b3b3;
            margin-bottom: 2rem;
        }
        .btn-netflix {
            background-color: #e50914;
            color: white;
            padding: 12px 30px;
            font-weight: bold;
            border: none;
            text-transform: uppercase;
        }
        .btn-netflix:hover {
            background-color: #ff0a16;
            color: white;
        }
    </style>
</head>
<body>

    <div class="error-container">
        <h1>500</h1>
        <h2 class="mb-3">Internal Server Error</h2>
        <p>
            Oops! Our movie projector seems to have jammed. <br>
            We're working on fixing the reel. Please try again later.
        </p>
        <a href="{% url 'movie_search' %}" class="btn btn-netflix">Go Back Home</a>
    </div>

</body>
</html>
