{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MovieRec | Join Now</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #141414; color: white; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .register-box { background: #1a1a1a; padding: 40px; border-radius: 10px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); width: 100%; max-width: 400px; margin-top: auto; }
        .btn-danger { background-color: #e50914; border: none; }
        .btn-danger:hover { background-color: #b20710; }
        
        /* Custom Input Styling to match the Netflix-style UI */
        .form-control-custom { 
            background-color: #333 !important; 
            border: 1px solid #444 !important; 
            color: white !important; 
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border-radius: 5px;
        }
        .form-control-custom::placeholder { color: #888; }
        
        .text-muted { color: #b3b3b3 !important; }
        #register-error { color: #e50914; font-size: 0.85rem; display: none; margin-bottom: 15px; text-align: left; }
    </style>
</head>
<body>
    <div class="container d-flex justify-content-center">
        <div class="register-box text-center">
            <h2 class="text-danger fw-bold mb-4">Create Account</h2>
            
            <div id="register-error"></div>

            <form onsubmit="handleRegister(event)">
                {% csrf_token %}
                <div class="text-start">
                    <input type="text" name="username" class="form-control-custom" 
                           placeholder="Username" required autocomplete="username">
                    
                    <input type="email" name="email" class="form-control-custom" 
                           placeholder="Email Address" required autocomplete="email">
                    
                    <input type="password" name="password" class="form-control-custom" 
                           placeholder="Password" required autocomplete="new-password">
                </div>
                
                <button type="submit" id="register-btn" class="btn btn-danger w-100 py-2 fw-bold mt-3">
                    <span id="btn-text">Join MovieRec</span>
                    <span id="btn-spinner" class="spinner-border spinner-border-sm d-none" role="status"></span>
                </button>
            </form>
            
            <p class="mt-4 text-muted small">
                Already have an account? <a href="{% url 'login' %}" class="text-white text-decoration-none fw-bold">Sign In</a>
            </p>
        </div>
    </div>

    <footer class="container py-5 mt-auto border-top border-secondary text-center text-muted">
        <p>2026 MovieRec AI Engine. Powered by Django & Machine Learning.</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{% static 'recommender/js/auth.js' %}"></script>
</body>
</html>
