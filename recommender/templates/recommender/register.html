<!DOCTYPE html>
<html lang="en">
<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #141414; color: white; height: 100vh; display: flex; align-items: center; }
        .register-box { background: #1a1a1a; padding: 40px; border-radius: 10px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); width: 100%; max-width: 400px; }
        .btn-danger { background-color: #e50914; border: none; }
        input { background-color: #333 !important; border: 1px solid #444 !important; color: white !important; margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-size: 0.9rem; color: #b3b3b3; }
        .helptext { font-size: 0.75rem; color: #888; display: block; margin-bottom: 10px; }
        .text-muted { color: #b3b3b3 !important; }
    </style>
</head>
<body>
    <div class="container d-flex justify-content-center">
        <div class="register-box text-center">
            <h2 class="text-danger fw-bold mb-4">Create Account</h2>
            <form method="POST">
                {% csrf_token %}
                <div class="text-start">
                    {{ form.as_p }}
                </div>
                <button type="submit" class="btn btn-danger w-100 py-2 fw-bold mt-3">Join MovieRec</button>
            </form>
            <p class="mt-4 text-muted small">Already have an account? <a href="{% url 'login' %}" class="text-white text-decoration-none">Sign In</a></p>
        </div>
    </div>
</body>
</html>
